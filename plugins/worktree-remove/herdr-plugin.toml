# herdr-plugin.toml — manifest for the worktree-remove plugin.
#
# Why this exists: herdr's built-in `remove_worktree` action calls
# `herdr worktree remove` WITHOUT --force. Any worktree with uncommitted /
# untracked changes (or git submodules) is "dirty", so git refuses to delete it
# and herdr returns `dirty_worktree_requires_force` — leaving the checkout
# DIRECTORY on disk. Since a worktree is the agent's working dir, it's almost
# always dirty, so the built-in delete key looks like it "does nothing".
#
# This plugin replaces that key (see config.toml -> prefix+alt+d):
#   - clean worktree  -> remove immediately (headless) + a notification
#   - dirty worktree  -> open a confirmation overlay listing the changes, and
#                        force-remove only after you confirm (destroys the work)
#   - main checkout / non-worktree -> refuse, with a notification
#
# It targets the *focused* worktree (resolved from `herdr workspace list`), to
# match the built-in's "remove the current one" behavior.
#
# Requires `node` >= 18 and `git` on PATH.

id = "worktree-remove"
name = "Worktree Remove (force-aware)"
version = "0.1.0"
description = "Remove the focused git worktree. Clean checkouts go immediately; dirty ones prompt for confirmation before force-removing, so the directory is actually deleted."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos"]

[[actions]]
id = "start"
title = "Remove focused worktree"
description = "Remove the focused worktree. Clean -> remove immediately; dirty -> confirm, then force-remove so the checkout directory is deleted."
contexts = ["workspace", "tab", "pane"]
command = ["node", "scripts/remove.js"]

[[panes]]
id = "confirm"
title = "Remove worktree?"
placement = "overlay"
command = ["node", "scripts/confirm.js"]
