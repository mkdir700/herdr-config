id = "superset-bootstrap"
name = "Superset Bootstrap"
version = "0.1.0"
description = "Run a repo's .superset/config.json setup/teardown commands when a Herdr worktree is created or removed."
min_herdr_version = "0.7.0"

platforms = ["macos", "linux"]

# Worktree created via CLI/API.
[[events]]
on = "worktree.created"
command = ["./hook.sh", "setup"]

# Worktree created via the Herdr UI does NOT emit worktree.created — focus is the
# backstop. Idempotency marker prevents re-running setup on every focus.
[[events]]
on = "workspace.focused"
command = ["./hook.sh", "setup"]

# Worktree removed (CLI/API/UI). Runs teardown.
[[events]]
on = "worktree.removed"
command = ["./hook.sh", "teardown"]
